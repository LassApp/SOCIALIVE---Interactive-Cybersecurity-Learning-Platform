<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialAlive</title>

  <!--
    Script anti-FOUC: identico nel meccanismo a quello già presente in
    style-guide.html (stessa chiave "sl-theme", stessa logica sincrona
    non-module). Duplicato qui di proposito, non estratto in un file
    condiviso: deve restare sincrono e indipendente dai moduli ES per
    eliminare il flash del tema sbagliato — un file esterno introdurrebbe
    una richiesta di rete che vanificherebbe lo scopo. Se la chiave
    cambia, va aggiornata in ENTRAMBI i punti (commento presente anche in
    js/services/themeService.js e in style-guide.html).
  -->
  <script>
    (function () {
      var STORAGE_KEY = "sl-theme";
      try {
        var stored = window.localStorage.getItem(STORAGE_KEY);
        var theme =
          stored === "light" || stored === "dark"
            ? stored
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <link rel="stylesheet" href="css/base/reset.css" />
  <link rel="stylesheet" href="css/tokens/colors.css" />
  <link rel="stylesheet" href="css/tokens/spacing.css" />
  <link rel="stylesheet" href="css/tokens/typography.css" />
  <link rel="stylesheet" href="css/tokens/radius.css" />
  <link rel="stylesheet" href="css/tokens/shadows.css" />
  <link rel="stylesheet" href="css/tokens/motion.css" />
  <link rel="stylesheet" href="css/themes/theme-light.css" />
  <link rel="stylesheet" href="css/themes/theme-dark.css" />
  <link rel="stylesheet" href="css/base/global.css" />

  <!--
    Elenco aggiornato in Fase 6: solo i componenti realmente montati
    dalle rotte esistenti (#/login, #/home, #/scenario/:scenarioId).
    Caricare CSS di componenti non ancora montati sarebbe peso morto
    (stesso principio già seguito in questo file da Fase 3/4/5).

    BUG TROVATO E CORRETTO in questo step: stories-bar.css, timeline.css
    e css/scenarios/profile-timeline.css (Fase 6/Step 2-3) erano stati
    consegnati come file ma non erano MAI stati collegati qui — la
    StoriesBar veniva quindi mostrata senza alcun CSS proprio: senza

    di default di una <ul>/<li> (blocco, quindi impilata verticalmente),
    esattamente il sintomo segnalato. Nessun bug nel componente stesso:
    il problema era solo di collegamento in questo file.
  -->

  <link rel="stylesheet" href="css/components/theme-switch.css" />
  <link rel="stylesheet" href="css/components/input.css" />
  <link rel="stylesheet" href="css/components/loader.css" />
  <link rel="stylesheet" href="css/components/login-form.css" />
  <link rel="stylesheet" href="css/components/app-header.css" />
  <link rel="stylesheet" href="css/components/profile-menu.css" />

  <link rel="stylesheet" href="css/components/stories-bar.css" />
  <link rel="stylesheet" href="css/components/timeline.css" />
  <link rel="stylesheet" href="css/components/media-viewer.css" />
  <link rel="stylesheet" href="css/scenarios/profile-timeline.css" />

  <link rel="stylesheet" href="css/layouts/home-page.css" />
  <link rel="stylesheet" href="css/layouts/scenario-page.css" />
</head>
<body>
  <main id="app-root"></main>

  <script type="module">
    import { initTheme } from "./js/services/themeService.js";
    import { init as initRouter, registerRoute } from "./js/core/router.js";
    import { createLoginPageController } from "./js/pages/loginPageController.js";
    import { createHomePageController } from "./js/pages/homePageController.js";
    import { createScenarioPageController } from "./js/pages/scenarioPageController.js";
    import { registerRenderer } from "./js/scenarios/scenarioEngine.js";
    import { renderProfileTimeline } from "./js/scenarios/renderers/profileTimelineRenderer.js";

    initTheme();

    // Registrazione dei renderer di scenario PRIMA di registrare le rotte
    // che potrebbero risolverli (stesso ordine già richiesto da
    // scenarioEngine.js: "PRIMA che scenarioPageController possa
    // risolvere una rotta #/scenario/:scenarioId").
    registerRenderer("profile-timeline", renderProfileTimeline);

    registerRoute("#/login", createLoginPageController, { protected: false });
    registerRoute("#/home", createHomePageController, { protected: true });
    registerRoute("#/scenario/:scenarioId", createScenarioPageController, { protected: true });

    initRouter(document.getElementById("app-root"));
  </script>
</body>
</html>
